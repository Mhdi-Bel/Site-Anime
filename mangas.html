<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <title>JikanExplorer - Manga</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link href="styles.css" rel="stylesheet">
</head>

<body>
  <div class="w-full">
    <!-- Navigation -->
    <section class="relative flex flex-col items-center max-md:px-2 text-white text-sm pt-8">
      <nav class="flex items-center border mx-4 w-full max-w-4xl bg-[#000000] mb-10 justify-between border-slate-700 px-4 py-2.5 rounded-full text-white">
        <a href="index.html">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 100" width="270" height="50">
            <g transform="translate(20, 10)">
              <path d="M25 15 L5 40 L25 65" stroke="#FFFFFF" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round" />
              <path d="M55 15 L75 40 L55 65" stroke="#FFFFFF" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round" />
              <circle cx="40" cy="40" r="16" fill="#00C896" />
              <g transform="translate(33, 33) scale(0.6)">
                <circle cx="10" cy="10" r="7" stroke="white" stroke-width="2.5" fill="none" />
                <line x1="15" y1="15" x2="21" y2="21" stroke="white" stroke-width="2.5" stroke-linecap="round" />
              </g>
            </g>
            <text x="120" y="62" class="jikan-text">
              <tspan class="jikan-bold">Jikan</tspan>
              <tspan class="jikan-regular">Explorer</tspan>
            </text>
          </svg>
        </a>
        <div id="menu" class="max-md:absolute max-md:bg-black/50 max-md:backdrop-blur max-md:top-0 transition-all duration-300 max-md:h-full max-md:w-full max-md:z-10 max-md:-left-full max-md:justify-center flex-col md:flex-row flex items-center gap-2">
          <a onclick="closeNavbar()" class="px-4 py-2" href="index.html">Home</a>
          <a onclick="closeNavbar()" class="px-4 py-2" href="animes.html">Anime</a>
          <a onclick="closeNavbar()" class="px-4 py-2 border border-white/10 bg-white/10 font-medium rounded-full" href="mangas.html">Manga</a>
          <a onclick="closeNavbar()" class="px-4 py-2" href="random.html">Random</a>
          <button onclick="closeNavbar()" class="md:hidden bg-gray-800 hover:bg-black text-white p-2 rounded-md aspect-square font-medium transition">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 6 6 18" />
              <path d="m6 6 12 12" />
            </svg>
          </button>
        </div>
        <button onclick="openNavbar()" class="md:hidden">
          <svg class="size-7" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
        <a href="https://github.com/Lnnzzz-00/Site-Anime" target="_blank" class="hidden md:flex items-center gap-2 bg-white hover:bg-gray-200 text-black px-4 py-2 rounded-full transition font-medium">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 24 24">
            <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
          </svg>
          GitHub
        </a>
      </nav>
    </section>

    <!-- Section Explorer les Mangas -->
    <section class="w-full bg-[#0a0a0a] min-h-screen pt-10 pb-32 relative shadow-[0_-20px_50px_rgba(0,0,0,0.05)] border-t border-white/5">
      <div class="max-w-7xl mx-auto px-4 relative z-10">
        
        <!-- En-tête : Titre et Barre de recherche -->
        <div class="flex flex-col md:flex-row items-center justify-between mb-10 gap-6">
          <h1 class="text-4xl md:text-5xl font-bold text-white tracking-tight">Browse all Mangas</h1>
          
          <div class="relative w-full md:w-[400px]">
            <input type="text" id="search-input" placeholder="Berserk, One Piece, Vagabond..." 
              class="w-full bg-white/5 border border-white/10 text-white placeholder-gray-500 px-6 py-3.5 rounded-full focus:outline-none focus:border-[#00C896] focus:bg-white/10 transition-all backdrop-blur-md">
            <button id="search-btn" class="absolute right-2 top-1/2 transform -translate-y-1/2 bg-[#00C896] hover:bg-[#00a37a] text-black p-2.5 rounded-full transition-colors shadow-lg shadow-[#00C896]/20">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
              </svg>
            </button>
          </div>
        </div>
        
        <!-- Grille des mangas (4 colonnes et 5 lignes via JS limit=20) -->
        <div id="manga-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-16">
           <div class="col-span-full flex flex-col items-center justify-center text-gray-500 py-20">
              <span class="relative flex h-8 w-8 mb-4">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-[#00C896] opacity-75"></span>
                <span class="relative inline-flex rounded-full h-8 w-8 bg-[#00C896]"></span>
              </span>
              Loading manga...
           </div>
        </div>

        <!-- Pagination -->
        <div class="flex justify-center items-center gap-4 border-t border-white/10 pt-8">
          <button id="prev-page" class="flex items-center gap-2 px-6 py-3 bg-white/5 border border-white/10 text-white font-medium rounded-full hover:bg-white/10 hover:border-white/20 disabled:opacity-30 disabled:cursor-not-allowed transition-all">
            <svg width="8" height="10" viewBox="0 0 6 8" fill="none" class="rotate-180"><path d="M1.25.5 4.75 4l-3.5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Previous
          </button>
          
          <div class="px-6 py-3 bg-black/50 border border-white/5 rounded-full backdrop-blur-sm">
            <span class="text-gray-400 text-sm">Page <span id="page-indicator" class="text-white font-bold text-base ml-1">1</span></span>
          </div>
          
          <button id="next-page" class="flex items-center gap-2 px-6 py-3 bg-[#00C896] text-black font-semibold rounded-full hover:bg-[#00a37a] hover:shadow-[0_0_20px_rgba(0,200,150,0.3)] hover:-translate-y-0.5 disabled:opacity-50 disabled:hover:translate-y-0 disabled:hover:shadow-none disabled:cursor-not-allowed transition-all duration-300">
            Next
            <svg width="8" height="10" viewBox="0 0 6 8" fill="none"><path d="M1.25.5 4.75 4l-3.5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
      </div>
    </section>

    <!-- Footer -->
    <footer class="w-full bg-white border-t border-white/5 py-10 relative z-10">
      <div class="max-w-6xl mx-auto px-4 flex flex-col md:flex-row items-center justify-between gap-6">
        <div class="flex items-center gap-2 opacity-90 hover:opacity-100 transition-opacity cursor-pointer">
          <div class="w-3 h-3 rounded-full bg-[#00C896] shadow-[0_0_10px_rgba(0,200,150,0.5)]"></div>
          <span class="text-black font-bold tracking-wide text-lg">Jikan<span class="font-normal">Explorer</span></span>
        </div>
        <p class="text-sm text-black">© 2026 JikanExplorer. Powered by Jikan API.</p>
      </div>
    </footer>

  </div>

  <script src="script.js"></script>

</body>
</html>
